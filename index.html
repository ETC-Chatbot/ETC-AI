<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETC AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; background-color: #000; }

        /* ===== SIDEBAR ===== */
        .icon-sidebar {
            width: 68px;
            background-color: #0e0e0e;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            box-sizing: border-box;
            flex-shrink: 0;
            border-right: 1px solid #222;

            /* ซ่อน sidebar ไว้ด้านซ้าย */
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* คอม: เอาเมาส์ชี้ที่ zone ริมซ้าย → sidebar เลื่อนออกมา */
        .sidebar-hover-zone:hover ~ .icon-sidebar,
        .icon-sidebar:hover {
            transform: translateX(0);
        }

        /* มือถือ + ปุ่ม toggle: ใช้ class .open แทน */
        .icon-sidebar.open {
            transform: translateX(0);
        }

        /* Zone ริมซ้ายสำหรับ hover บนคอม (บางมาก มองไม่เห็น) */
        .sidebar-hover-zone {
            position: fixed;
            left: 0;
            top: 0;
            width: 12px;
            height: 100%;
            z-index: 99;
        }

        /* Overlay มืดด้านหลัง sidebar บนมือถือ */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }
        .sidebar-overlay.show { display: block; }

        /* ปุ่ม ☰ มุมซ้ายบน (มองเห็นเสมอ) */
        .menu-toggle-btn {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 98;
            background: rgba(38, 26, 64, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(168, 199, 250, 0.2);
            color: #a8c7fa;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
        }
        .menu-toggle-btn:hover { background: rgba(60, 40, 100, 0.85); }

        .top-icons { display: flex; flex-direction: column; align-items: center; gap: 24px; }
        
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; background: url('img/EGG.jpg') no-repeat center center; background-size: cover; z-index: 1; overflow: hidden; }

        #stars-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        
        .sparkle { position: absolute; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%); border-radius: 50%; animation: twinkle var(--duration) infinite ease-in-out; opacity: 0; }
        @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.6; transform: scale(1.2); } }
        
        .logo-container { position: relative; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .logo-spin { width: 40px; height: 40px; border-radius: 50%; z-index: 2; animation: rotateLogo 8s linear infinite; object-fit: cover; border: 2px solid rgba(168, 199, 250, 0.2); }
        @keyframes rotateLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .logo-container::before { content: ""; position: absolute; width: 46px; height: 46px; border-radius: 50%; background: rgba(168, 199, 250, 0.4); filter: blur(8px); z-index: 1; animation: glowPulse 2s ease-in-out infinite; }
        @keyframes glowPulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
        .logo-container::after { content: ""; position: absolute; width: 52px; height: 52px; border-radius: 50%; background: conic-gradient(from 0deg, #ffb4a2, #a8c7fa, #9c27b0, #ffb4a2); filter: blur(1px); z-index: 1; animation: rotateLogo 3s linear infinite, sparklePulse 1s ease-in-out infinite alternate; }
        @keyframes sparklePulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        .header-top { width: 100%; display: flex; justify-content: flex-end; padding: 16px 24px; box-sizing: border-box; position: relative; z-index: 15; }
        .upgrade-btn { background-color: rgba(26, 26, 26, 0.7); color: #a8c7fa; border: 1px solid #444; padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        
        .chat-view { position: absolute; top: 90px; left: 0; right: 0; bottom: 100px; overflow-y: auto !important; padding: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 600px; width: 50%; margin-left: auto; margin-right: auto; box-sizing: border-box; scroll-behavior: smooth; z-index: 2; transition: all 0.5s ease; }
        .chat-view::-webkit-scrollbar { width: 8px !important; }
        .chat-view::-webkit-scrollbar-thumb { background-color: #555 !important; border-radius: 4px !important; }

        /* มือถือ: chat-view เต็มความกว้าง */
        @media (max-width: 600px) {
            .chat-view { width: 92%; }
        }

        #centerTitle { transition: all 0.6s ease-in-out; opacity: 1; color: #e3e3e3; margin-bottom: 20px; }
        #welcomeContainer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 820px; z-index: 5; transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); text-align: center; }
        .fade-out-up { opacity: 0 !important; transform: translate(-50%, -550%) !important; pointer-events: none; }

        .bottom-input-container { width: 100%; display: flex; justify-content: center; z-index: 3; position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); padding: 0 20px; box-sizing: border-box; }
        .is-chatting-input { bottom: 20px !important; top: auto !important; transform: translate(-50%, 0) !important; }
        
        .gemini-input-box { width: 100%; max-width: 760px; background-color: rgba(38, 26, 64, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 32px; padding: 8px 20px; display: flex; align-items: center; border: 1px solid rgba(168, 199, 250, 0.2); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7), 0 4px 12px rgba(20, 10, 40, 0.6), 0 0 30px rgba(156, 39, 176, 0.2); }
        .gemini-input-box input { flex: 1; background: transparent; border: none; outline: none; color: #e3e3e3; font-size: 16px; padding: 12px 6px; }
        .send-arrow-btn { background: transparent; color: #a8c7fa; border: none; cursor: pointer; font-size: 18px; padding: 10px; }
        
        .chat-row { width: 100%; display: flex; align-items: flex-end; gap: 12px; }
        .row-bot { justify-content: flex-start; }
        .row-user { justify-content: flex-end; }
        .chat-bubble { width: fit-content; max-width: 80%; font-size: 16px; padding: 10px 16px; border-radius: 18px; background: rgba(38, 26, 64, 0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(168, 199, 250, 0.15); color: #fff; }
        .row-user .chat-bubble { background-color: rgba(98, 0, 234, 0.7); }
        .avatar-user { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; background-color: #9c27b0; color: white; }
        .avatar-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .menu-icon { color: #c4c7c5; font-size: 18px; cursor: pointer; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }

        .electronic-icon { transition: transform 0.25s ease, filter 0.25s ease; filter: drop-shadow(0 0 4px rgba(168, 199, 250, 0.5)); }
        .electronic-icon:hover { transform: scale(1.15); filter: drop-shadow(0 0 10px rgba(168, 199, 250, 0.9)) drop-shadow(0 0 18px rgba(156, 39, 176, 0.6)); }
        .avatar-img.avatar-fallback { background: linear-gradient(135deg, #a8c7fa, #9c27b0); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #fff; }
        .logo-spin.logo-fallback { background: conic-gradient(from 0deg, #ffb4a2, #a8c7fa, #9c27b0, #ffb4a2); }

        .upgrade-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 20; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); animation: fadeInUpgrade 0.35s ease; }
        .upgrade-overlay.show { display: flex; }
        @keyframes fadeInUpgrade { from { opacity: 0; } to { opacity: 1; } }
        .upgrade-overlay .back-btn { position: absolute; top: 24px; left: 24px; display: flex; align-items: center; gap: 6px; background-color: rgba(38, 26, 64, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); color: #a8c7fa; border: 1px solid rgba(168, 199, 250, 0.2); padding: 10px 18px; border-radius: 20px; font-size: 14px; cursor: pointer; transition: transform 0.2s ease, background-color 0.2s ease; }
        .upgrade-overlay .back-btn:hover { transform: translateX(-3px); background-color: rgba(50, 35, 80, 0.85); }
        .upgrade-overlay .icon-glow { position: relative; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; font-size: 42px; margin-bottom: 28px; }
        .upgrade-overlay .icon-glow::before { content: ""; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, #ffb4a2, #a8c7fa, #9c27b0, #ffb4a2); filter: blur(18px); opacity: 0.6; animation: rotateLogo 4s linear infinite, sparklePulse 2s ease-in-out infinite alternate; }
        .upgrade-overlay .upgrade-title { color: #f0eaff; font-size: 28px; margin-bottom: 12px; position: relative; z-index: 2; }
        .upgrade-overlay .upgrade-subtitle { color: #b8b3c9; font-size: 15px; max-width: 420px; line-height: 1.7; margin-bottom: 32px; position: relative; z-index: 2; }
        .upgrade-overlay .status-card { background-color: rgba(38, 26, 64, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(168, 199, 250, 0.15); border-radius: 18px; padding: 16px 28px; display: flex; align-items: center; gap: 10px; color: #a8c7fa; font-size: 14px; position: relative; z-index: 2; }
        .upgrade-overlay .status-card-dot { width: 8px; height: 8px; border-radius: 50%; background: #ffb4a2; box-shadow: 0 0 8px #ffb4a2; animation: blinkUpgrade 1.4s infinite ease-in-out; }
        @keyframes blinkUpgrade { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .logo-popup-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 30; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); cursor: pointer; animation: fadeInUpgrade 0.3s ease; }
        .logo-popup-overlay.show { display: flex; }
        .logo-popup-img { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; box-shadow: 0 0 60px rgba(168, 199, 250, 0.4), 0 0 100px rgba(156, 39, 176, 0.3); animation: logoPopupIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes logoPopupIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .settings-overlay { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 25; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); animation: fadeInUpgrade 0.3s ease; }
        .settings-overlay.show { display: flex; }
        .settings-panel { width: 90%; max-width: 420px; max-height: 80vh; overflow-y: auto; background: rgba(24, 16, 38, 0.95); border: 1px solid rgba(168, 199, 250, 0.15); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); animation: logoPopupIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .settings-panel::-webkit-scrollbar { width: 6px; }
        .settings-panel::-webkit-scrollbar-thumb { background-color: #555; border-radius: 4px; }
        .settings-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 22px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .settings-header h2 { color: #f0eaff; font-size: 19px; }
        .settings-close-btn { background: rgba(255,255,255,0.06); border: none; color: #c4c7c5; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; transition: background 0.2s ease; }
        .settings-close-btn:hover { background: rgba(255,255,255,0.15); }
        .settings-body { padding: 20px 22px; }
        .profile-card { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
        .profile-avatar-large { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #ffb4a2, #9c27b0); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; flex-shrink: 0; object-fit: cover; border: 2px solid rgba(168, 199, 250, 0.3); transition: transform 0.2s ease; overflow: hidden; }
        .profile-avatar-large:hover { transform: scale(1.05); }
        .profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .profile-info { flex: 1; }
        .profile-name-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(168, 199, 250, 0.15); border-radius: 10px; padding: 9px 12px; color: #f0eaff; font-size: 14px; outline: none; margin-bottom: 6px; }
        .profile-name-input:focus { border-color: #a8c7fa; }
        .profile-hint { color: #8a8597; font-size: 12px; }
        .settings-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 16px 0; }
        .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; color: #e3e3e3; font-size: 14.5px; }
        .settings-select { background: rgba(255,255,255,0.06); border: 1px solid rgba(168, 199, 250, 0.15); border-radius: 8px; color: #c9c4d8; padding: 6px 10px; font-size: 13px; outline: none; cursor: pointer; }
        .settings-toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
        .settings-toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.15); border-radius: 22px; transition: 0.25s; }
        .toggle-slider::before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: #fff; border-radius: 50%; transition: 0.25s; }
        .settings-toggle input:checked + .toggle-slider { background: linear-gradient(135deg, #a8c7fa, #9c27b0); }
        .settings-toggle input:checked + .toggle-slider::before { transform: translateX(18px); }
        .settings-save-btn { width: 100%; background: linear-gradient(135deg, #a8c7fa, #9c27b0); color: #fff; border: none; border-radius: 12px; padding: 12px; font-size: 14.5px; font-weight: 600; cursor: pointer; margin-top: 6px; transition: opacity 0.2s ease; }
        .settings-save-btn:hover { opacity: 0.88; }
    </style>
</head>
<body>

    <!-- Zone ริมซ้ายสำหรับ hover บนคอม (บางมาก มองไม่เห็น) -->
    <div class="sidebar-hover-zone"></div>

    <!-- Overlay มืดด้านหลัง sidebar (มือถือ) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- ปุ่ม ☰ เปิด/ปิด sidebar -->
    <button class="menu-toggle-btn" id="menuToggleBtn" onclick="toggleSidebar()">☰</button>

    <div class="icon-sidebar" id="iconSidebar">
        <div class="top-icons">
            <div class="logo-container" onclick="showLogoPopup()">
                <img src="img/ETC.png" alt="ETC Logo" class="logo-spin" onerror="this.onerror=null; this.removeAttribute('src'); this.classList.add('logo-fallback');">
            </div>
            <div class="menu-icon electronic-icon" onclick="location.reload()" title="เริ่มแชทใหม่">⚡</div>
            <div class="menu-icon electronic-icon" title="ค้นหา">🔬</div>
            <div class="menu-icon electronic-icon" title="เมนู">💾</div>
        </div>
        <div class="bottom-icons">
            <div class="menu-icon electronic-icon" onclick="showSettingsPage()" title="ตั้งค่า">⚙</div>
            <div class="menu-icon" id="profileAvatarBtn" onclick="showSettingsPage()" style="background:#ffb4a2; color:#333; cursor:pointer;">ME</div>
        </div>
    </div>

    <div class="main-container">
        <div id="stars-layer"></div>
        <div class="header-top"><button class="upgrade-btn" onclick="showUpgradePage()">✨ อัปเกรด</button></div>
        
        <div id="welcomeContainer">
            <h1 id="centerTitle">สวัสดีค่ะ มีอะไรให้ ETC ช่วยดูแลไหมคะ?</h1>
        </div>

        <div class="chat-view" id="chatWindow"></div>

        <div id="inputWrapper" class="bottom-input-container">
            <div class="gemini-input-box">
                <input type="text" id="userInputText" name="etc-chat-input-no-save" autocomplete="off" placeholder="พิมพ์ข้อความที่นี่..." onkeypress="if(event.key==='Enter') handleSendAction()">
                <button class="send-arrow-btn" id="actionBtn" onclick="handleSendAction()">➔</button>
            </div>
        </div>

        <div id="upgradePage" class="upgrade-overlay">
            <button class="back-btn" onclick="hideUpgradePage()">← กลับไปหน้าแชท</button>
            <div class="icon-glow">✨</div>
            <h1 class="upgrade-title">อัปเกรดเป็น ETC Pro</h1>
            <p class="upgrade-subtitle">ฟีเจอร์ระดับพรีเมียมกำลังอยู่ระหว่างการพัฒนา เร็วๆ นี้คุณจะได้พบกับความสามารถใหม่ๆ ที่ทรงพลังยิ่งขึ้นค่ะ</p>
            <div class="status-card">
                <span class="status-card-dot"></span>
                <span>กำลังพัฒนา — เร็วๆ นี้</span>
            </div>
        </div>

        <div id="settingsPage" class="settings-overlay">
            <div class="settings-panel">
                <div class="settings-header">
                    <h2>ทั่วไป</h2>
                    <button class="settings-close-btn" onclick="hideSettingsPage()">✕</button>
                </div>
                <div class="settings-body">
                    <div class="profile-card">
                        <div class="profile-avatar-large" id="profileAvatarLarge" onclick="document.getElementById('avatarFileInput').click()">ME</div>
                        <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">
                        <div class="profile-info">
                            <input type="text" id="profileNameInput" class="profile-name-input" placeholder="ตั้งชื่อผู้ใช้ของคุณ" maxlength="20" autocomplete="off">
                            <p class="profile-hint">แตะที่รูปวงกลมเพื่ออัปโหลดรูปโปรไฟล์ค่ะ</p>
                        </div>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <span>รูปลักษณ์</span>
                        <select class="settings-select" id="themeSelect">
                            <option value="dark">มืด (ระบบ)</option>
                            <option value="dark-only">มืดเสมอ</option>
                        </select>
                    </div>
                    <div class="settings-row">
                        <span>ภาษา</span>
                        <select class="settings-select" id="langSelect">
                            <option value="th">ไทย</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                    <div class="settings-row">
                        <span>เสียงตอบกลับ</span>
                        <label class="settings-toggle">
                            <input type="checkbox" id="soundToggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="settings-divider"></div>
                    <button class="settings-save-btn" onclick="saveProfileSettings()">บันทึกการตั้งค่า</button>
                </div>
            </div>
        </div>

        <div id="logoPopup" class="logo-popup-overlay" onclick="hideLogoPopup()">
            <img src="img/ETC.png" alt="ETC Logo Large" class="logo-popup-img" onerror="this.onerror=null; this.style.display='none';">
        </div>
    </div>

    <script>
        const now = new Date();
        const today = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        const timeNow = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        
        let chatHistory = [{ 
            role: "system", 
            content: `คุณคือ ETC เลขาสาวผู้ชาญฉลาด เพศหญิง คุณมีความเชี่ยวชาญพิเศษด้านวิทยาศาสตร์และอิเล็กทรอนิกส์ แต่คุณสามารถตอบคำถามทั่วไป ประวัติศาสตร์ หรือเรื่องอื่นๆ ได้อย่างครบถ้วนและสุภาพ | กฎสำคัญที่ต้องทำตามเสมอ: 1. ให้ข้อมูลที่ถูกต้องแม่นยำและเป็นประโยชน์ ตอบให้ครบถ้วนตามที่ผู้ใช้ต้องการ สามารถพูดคุยทักทายเป็นมิตรและแนะนำสิ่งที่เป็นประโยชน์เพิ่มเติมได้ตามความเหมาะสม | 2. ห้ามพูดถึงวันที่หรือเวลาในคำตอบโดยเด็ดขาด ยกเว้นผู้ใช้ถามเรื่องวันที่หรือเวลาโดยตรงเท่านั้น ถ้าถูกถามจริงๆ ค่อยตอบว่าปัจจุบันคือ ${today} เวลา ${timeNow} น. | 3. หากเป็นคำถามด้านวิทยาศาสตร์หรืออิเล็กทรอนิกส์ให้ตอบด้วยความเชี่ยวชาญเป็นพิเศษ | 4. ลงท้ายประโยคด้วย 'ค่ะ' เสมอ | 5. ห้ามใช้คำว่า 'ครับ' 'ผม' หรือสรรพนามและคำลงท้ายแบบเพศชายเด็ดขาดในทุกคำตอบ ไม่ว่าบทสนทนาจะยาวแค่ไหนก็ตาม ให้คงความเป็นเลขาสาวไว้เสมอ | 6. หากเป็นคำทักทายทั่วไป ให้ทักทายกลับอย่างอบอุ่นและอาจถามได้ว่ามีอะไรให้ช่วยเหลือเพิ่มเติมไหม` 
        }];

        let currentController = null;
        let isAiThinking = false;
        let isFirstMessage = true;

        // ===== ระบบ Sidebar =====
        function toggleSidebar() {
            const sidebar = document.getElementById('iconSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('open');
            if (isOpen) {
                closeSidebar();
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('show');
            }
        }

        function closeSidebar() {
            document.getElementById('iconSidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }

        // คอม: hover เข้า sidebar zone → เปิด, hover ออก → ปิด (ถ้าไม่ได้กดค้างไว้)
        const sidebar = document.getElementById('iconSidebar');
        sidebar.addEventListener('mouseleave', () => {
            // ปิดเฉพาะตอนที่ไม่ได้กดปุ่ม toggle (เช่น hover เปิดมา)
            if (!sidebar.dataset.pinned) {
                sidebar.classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('show');
            }
        });

        // ===== ฟังก์ชันอื่นๆ =====
        function showUpgradePage() { document.getElementById("upgradePage").classList.add("show"); }
        function hideUpgradePage() { document.getElementById("upgradePage").classList.remove("show"); }
        function showLogoPopup() { document.getElementById("logoPopup").classList.add("show"); }
        function hideLogoPopup() { document.getElementById("logoPopup").classList.remove("show"); }
        function showSettingsPage() { document.getElementById("settingsPage").classList.add("show"); }
        function hideSettingsPage() { document.getElementById("settingsPage").classList.remove("show"); }

        let userProfile = { name: "ME", avatarDataUrl: null };

        function loadUserProfile() {
            try {
                const saved = localStorage.getItem("etc_user_profile");
                if (saved) userProfile = JSON.parse(saved);
            } catch (e) {}
            applyProfileToUI();
        }

        function applyProfileToUI() {
            const displayText = userProfile.name ? userProfile.name.substring(0, 2).toUpperCase() : "ME";
            const sidebarBtn = document.getElementById("profileAvatarBtn");
            if (userProfile.avatarDataUrl) {
                sidebarBtn.style.backgroundImage = `url(${userProfile.avatarDataUrl})`;
                sidebarBtn.style.backgroundSize = "cover";
                sidebarBtn.style.backgroundPosition = "center";
                sidebarBtn.textContent = "";
            } else {
                sidebarBtn.style.backgroundImage = "";
                sidebarBtn.textContent = displayText;
            }
            const largeAvatar = document.getElementById("profileAvatarLarge");
            if (userProfile.avatarDataUrl) {
                largeAvatar.innerHTML = `<img src="${userProfile.avatarDataUrl}" alt="profile">`;
            } else {
                largeAvatar.textContent = displayText;
            }
            document.getElementById("profileNameInput").value = userProfile.name === "ME" ? "" : userProfile.name;
        }

        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                userProfile.avatarDataUrl = e.target.result;
                applyProfileToUI();
            };
            reader.readAsDataURL(file);
        }

        function saveProfileSettings() {
            const nameInput = document.getElementById("profileNameInput").value.trim();
            userProfile.name = nameInput || "ME";
            try { localStorage.setItem("etc_user_profile", JSON.stringify(userProfile)); } catch (e) {}
            applyProfileToUI();
            hideSettingsPage();
        }

        function getTemperatureForText(text) {
            const creativeKeywords = ["แต่งกลอน", "แต่งเพลง", "เขียนเรียงความ", "แต่งนิยาย", "แต่งเรื่อง", "เขียนบทกวี", "แต่งคำกลอน", "เขียนนิทาน", "แต่งเนื้อเพลง"];
            for (const keyword of creativeKeywords) {
                if (text.toLowerCase().includes(keyword)) return 0.8;
            }
            return 0.1;
        }

        function handleSendAction() {
            const input = document.getElementById("userInputText");
            const actionBtn = document.getElementById("actionBtn");
            if (isAiThinking) {
                if (currentController) currentController.abort();
                isAiThinking = false;
                actionBtn.innerText = "➔";
                actionBtn.style.color = "#a8c7fa";
                return;
            }
            if (input.value.trim() === "") return;
            if (isFirstMessage) {
                document.getElementById("welcomeContainer").classList.add("fade-out-up");
                document.getElementById("inputWrapper").classList.add("is-chatting-input");
                isFirstMessage = false;
            }
            const userText = input.value.trim();
            chatHistory.push({ role: "user", content: userText });
            executeMessageSend(userText);
            input.value = "";
        }

        async function executeMessageSend(text) {
            const chatWindow = document.getElementById("chatWindow");
            const actionBtn = document.getElementById("actionBtn");
            isAiThinking = true;
            actionBtn.innerText = "■";
            actionBtn.style.color = "#ff6b9d";
            currentController = new AbortController();
            const userAvatarHtml = userProfile.avatarDataUrl
                ? `<div class="avatar-user" style="background-image:url(${userProfile.avatarDataUrl}); background-size:cover; background-position:center;"></div>`
                : `<div class="avatar-user">${userProfile.name ? userProfile.name.substring(0,2).toUpperCase() : "ME"}</div>`;
            chatWindow.insertAdjacentHTML('beforeend', `<div class="chat-row row-user"><div class="chat-bubble">${text}</div>${userAvatarHtml}</div>`);
            const botId = 'bot-' + Date.now();
            chatWindow.insertAdjacentHTML('beforeend', `<div class="chat-row row-bot"><img src="img/ETC.png" class="avatar-img" onerror="this.onerror=null; this.removeAttribute('src'); this.classList.add('avatar-fallback'); this.innerText='ETC';"><div class="chat-bubble" id="${botId}">ETC กำลังคิด...</div></div>`);
            try {
                const res = await fetch("http://127.0.0.1:1234/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer lm-studio" },
                    signal: currentController.signal,
                    body: JSON.stringify({ model: "local-model", messages: chatHistory, stream: true, temperature: getTemperatureForText(text) })
                });
                const reader = res.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullResponse = "", buffer = "";
                while(true) {
                    const {done, value} = await reader.read();
                    if(done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (line.trim().startsWith("data: ")) {
                            try {
                                const json = JSON.parse(line.trim().slice(6));
                                if (json.choices[0].delta.content) {
                                    if(fullResponse === "") document.getElementById(botId).innerHTML = "";
                                    fullResponse += json.choices[0].delta.content;
                                    document.getElementById(botId).innerHTML = marked.parse(fullResponse);
                                    chatWindow.scrollTop = chatWindow.scrollHeight;
                                }
                            } catch(e) {}
                        }
                    }
                }
                chatHistory.push({ role: "assistant", content: fullResponse });
            } catch(e) { document.getElementById(botId).textContent = "คำตอบถูกยกเลิกค่ะ"; } 
            finally { isAiThinking = false; actionBtn.innerText = "➔"; actionBtn.style.color = "#a8c7fa"; }
        }

        loadUserProfile();
    </script>
</body>
</html>
